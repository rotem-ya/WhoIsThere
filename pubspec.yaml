name: whois_there
description: Guess the Place - identify famous landmarks
publish_to: 'none'
version: 1.4.3+103

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10  # push notifications (friend game invites)

  # Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.0  # SHA-256 nonce for Apple sign-in

  # State Management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1  # pre-warm/check the same cache CachedNetworkImage uses (remote places)
  shimmer: ^3.0.0
  audioplayers: ^5.2.1

  # Storage
  shared_preferences: ^2.2.3

  # Deep links
  app_links: ^6.0.0

  # Utils
  uuid: ^4.3.3
  equatable: ^2.0.5
  intl: ^0.19.0
  share_plus: ^9.0.0
  gal: ^2.3.0  # save images directly to the device gallery/photos
  qr_flutter: ^4.1.0  # download-link QR badge on saved/shared game images
  url_launcher: ^6.3.0
  wakelock_plus: ^1.1.4
  google_mobile_ads: '>=5.2.0 <5.3.0'
  app_tracking_transparency: ^2.0.4  # iOS ATT prompt before ad tracking
  in_app_review: ^2.0.9  # store rating prompt after good moments (wins)
  firebase_analytics: ^10.8.0  # usage analytics (DAU, game funnels, revenue events)

# Pin google_sign_in_ios to the last release on GoogleSignIn 7 / GoogleUtilities 7.
# 5.8.0+ moved to GoogleSignIn 8 / GoogleUtilities 8, which conflicts with
# Firebase 10's GoogleUtilities ~> 7 ("could not find compatible versions for
# pod GoogleUtilities/Environment").
dependency_overrides:
  google_sign_in_ios: 5.7.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.11
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/tiles/
    - assets/images/places/
    - assets/images/mascot/
    - assets/game_places/images/
    - assets/game_places/data/
    - assets/sounds/
    - assets/sounds/ui/
    - assets/lottie/
    - assets/icons/
    - assets/skins/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/icon.png
  adaptive_icon_background: '#D9A820'
  adaptive_icon_foreground: assets/icons/icon.png
  min_sdk_android: 21
