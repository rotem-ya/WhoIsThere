name: whois_there
description: Guess the Place - identify famous landmarks
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0

  # Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.0

  # State Management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  audioplayers: ^5.2.1

  # Storage
  shared_preferences: ^2.2.3

  # Deep links
  app_links: ^6.0.0

  # Utils
  uuid: ^4.3.3
  equatable: ^2.0.5
  intl: ^0.19.0
  share_plus: ^9.0.0
  wakelock_plus: ^1.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.11
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/tiles/
    - assets/images/places/
    - assets/game_places/images/
    - assets/game_places/data/
    - assets/sounds/
    - assets/icons/
    - assets/skins/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/icon.jpg
  adaptive_icon_background: '#07101F'
  adaptive_icon_foreground: assets/icons/icon.jpg
  min_sdk_android: 21
