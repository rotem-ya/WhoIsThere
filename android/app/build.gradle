plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader -> localProperties.load(reader) }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

android {
    namespace "com.whoisthere.app"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "com.whoisthere.app"
        minSdk 21
        targetSdk flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            def keystoreFile = file("keystore.jks")
            def storePass = System.getenv("KEYSTORE_STORE_PASS")
            def keyAliasValue = System.getenv("KEYSTORE_ALIAS")
            def keyPass = System.getenv("KEYSTORE_KEY_PASS")

            if (keystoreFile.exists()) {
                if (!storePass || !keyAliasValue || !keyPass) {
                    throw new GradleException("Release keystore exists, but KEYSTORE_STORE_PASS, KEYSTORE_ALIAS, or KEYSTORE_KEY_PASS is missing.")
                }

                storeFile keystoreFile
                storePassword storePass
                keyAlias keyAliasValue
                keyPassword keyPass
            }
        }
    }

    buildTypes {
        debug {
            shrinkResources false
            minifyEnabled false
        }
        release {
            def keystoreFile = file("keystore.jks")
            signingConfig keystoreFile.exists() ? signingConfigs.release : signingConfigs.debug
            shrinkResources false
            minifyEnabled false
        }
    }
}

flutter {
    source "../.."
}
