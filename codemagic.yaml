# Codemagic CI — build WhoIsThere for iOS and ship to TestFlight.
#
# One-time setup in the Codemagic UI (see IOS_TESTFLIGHT_SETUP.md):
#   1. Connect this repository (rotem-ya/WhoIsThere) as an app.
#   2. Teams → Integrations → App Store Connect API key named "Apple_Key_Trivia"
#      (Key ID 995PSX889V) — referenced below under `integrations`.
#   3. In App Store Connect, create the app with bundle id  com.rotem.whoisthere.
# Then run the `ios-testflight` workflow. Codemagic handles signing automatically.

workflows:
  ios-testflight:
    name: WhoIsThere iOS — TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: Apple_Key_Trivia
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up iOS code signing
        script: |
          keychain initialize
          # Create an iOS Distribution certificate WITH its private key
          # (--save persists it to Codemagic for reuse). This is what was
          # missing: previous runs found a cert on Apple but had no private key.
          app-store-connect create-certificate --type IOS_DISTRIBUTION --save
          # Create the App Store provisioning profile for our bundle id.
          app-store-connect fetch-signing-files "com.rotem.whoisthere" \
            --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Uploads the build to TestFlight so you can install it on your iPhone
        # via the TestFlight app. Does NOT submit for App Store review.
        submit_to_testflight: true
