# Codemagic CI — build WhoIsThere for iOS and ship to TestFlight.
#
# One-time setup in the Codemagic UI (see IOS_TESTFLIGHT_SETUP.md):
#   1. Connect this repository (rotem-ya/WhoIsThere) as an app.
#   2. Teams → Integrations → App Store Connect API key named "Apple_Key_Trivia"
#      (Key ID 995PSX889V) — referenced below under `integrations`.
#   3. In App Store Connect, create the app with bundle id  com.rotem.whoisthere.
# Then run the `ios-testflight` workflow. Codemagic handles signing automatically.

workflows:
  ios-testflight:
    name: WhoIsThere iOS — TestFlight
    # Controlled trigger: push a tag like `ios-v3` to build + ship to TestFlight.
    # (No per-commit iOS builds — mac minutes are limited.) You can also run it
    # manually from the Codemagic UI. Requires the one-time setup to be done
    # (repo connected in Codemagic + the `Apple_Key_Trivia` ASC API key added).
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'ios-v*'
          include: true
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: Apple_Key_Trivia
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rotem.whoisthere
      flutter: 3.24.5
      # App Store Connect now requires the current Apple SDK. Keep the gRPC/Firebase
      # compatibility patches below because the current Firebase iOS stack is old.
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Fix iOS project assets
        script: |
          set -e
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          # The project currently contains two Assets.xcassets references.
          # The resource build phase can point to ios/Assets.xcassets, which has no AppIcon.
          # Point it back to ios/Runner/Assets.xcassets, where AppIcon.appiconset exists.
          perl -0pi -e 's/fileRef = 97C146FD1CF9000F007C117D \/\* Assets\.xcassets \*\//fileRef = 97C146FB1CF9000F007C117D \/\* Assets.xcassets \*\//g' "$PBXPROJ"
          grep -n "Assets.xcassets in Resources" "$PBXPROJ"
          # App Store Connect rejects app icons that contain transparency or an alpha channel.
          python3 tool/ci/flatten_ios_app_icons.py ios/Runner/Assets.xcassets/AppIcon.appiconset
      - name: Diagnose signing identities
        script: |
          echo "===== 1. VALID CODESIGNING IDENTITIES ====="
          security find-identity -v -p codesigning \
            /Users/builder/Library/codemagic-cli-tools/keychains/*.keychain-db || true
          echo ""
          echo "===== 2. ALL IDENTITIES (incl. invalid) ====="
          security find-identity -v \
            /Users/builder/Library/codemagic-cli-tools/keychains/*.keychain-db || true
          echo ""
          echo "===== 3. PROFILES ON DISK ====="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || true
          echo ""
          echo "===== 4. CERTS ON DISK ====="
          ls -la "$HOME/Library/MobileDevice/Certificates/" || true
          echo ""
          echo "===== 5. WHICH CERT EACH PROFILE EXPECTS ====="
          for p in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision; do
            echo "--- Profile file: $p ---"
            security cms -D -i "$p" > /tmp/prof.plist 2>/dev/null || true
            echo "Name:"
            /usr/libexec/PlistBuddy -c "Print :Name" /tmp/prof.plist 2>/dev/null || true
            echo "UUID:"
            /usr/libexec/PlistBuddy -c "Print :UUID" /tmp/prof.plist 2>/dev/null || true
            echo "Expected cert SHA1 fingerprint:"
            /usr/libexec/PlistBuddy -c "Print :DeveloperCertificates:0" /tmp/prof.plist 2>/dev/null \
              | openssl x509 -inform DER -noout -fingerprint -sha1 2>/dev/null || true
            echo "Expected cert subject:"
            /usr/libexec/PlistBuddy -c "Print :DeveloperCertificates:0" /tmp/prof.plist 2>/dev/null \
              | openssl x509 -inform DER -noout -subject 2>/dev/null || true
            echo ""
          done
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: |
          # Offset the Codemagic build counter by 1000 so the CFBundleVersion is
          # always > 55 (TestFlight already has build 55 from the legacy path)
          # while staying strictly increasing across builds. Apple rejects a
          # resubmit whose build number isn't higher than the last one.
          BUILD_NUMBER=$((PROJECT_BUILD_NUMBER + 1000))
          echo "Using iOS build number: $BUILD_NUMBER"
          flutter build ipa --release \
            --build-name=1.1.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Uploads the build to TestFlight so you can install it on your iPhone
        # via the TestFlight app. Does NOT submit for App Store review.
        submit_to_testflight: true
