# Codemagic CI — build WhoIsThere and ship to the stores.
#   • stores-release  → ONE run: build IPA + AAB, upload to BOTH TestFlight and
#                       Google Play in a single build   (tag: release-v*)  ← main
#   • ios-testflight  → iOS only: build IPA + upload to TestFlight (tag: ios-v*)
#                       kept as a fallback for iOS-only hotfixes.
#
# One-time iOS setup in the Codemagic UI (see IOS_TESTFLIGHT_SETUP.md):
#   1. Connect this repository (rotem-ya/WhoIsThere) as an app.
#   2. Teams → Integrations → App Store Connect API key named "Apple_Key_Trivia"
#      (Key ID 995PSX889V) — referenced below under `integrations`.
#   3. In App Store Connect, create the app with bundle id  com.rotem.whoisthere.
# One-time Android setup (see ANDROID_GOOGLEPLAY_SETUP.md): add a Google Play
#   service-account JSON as the `google_play` env var group.
# Then push the matching tag; Codemagic handles signing automatically.

workflows:
  ios-testflight:
    name: WhoIsThere iOS — TestFlight
    # Controlled trigger: push a tag like `ios-v3` to build + ship to TestFlight.
    # (No per-commit iOS builds — mac minutes are limited.) You can also run it
    # manually from the Codemagic UI. Requires the one-time setup to be done
    # (repo connected in Codemagic + the `Apple_Key_Trivia` ASC API key added).
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'ios-v*'
          include: true
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: Apple_Key_Trivia
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rotem.whoisthere
      flutter: 3.24.5
      # App Store Connect now requires the current Apple SDK. Keep the gRPC/Firebase
      # compatibility patches below because the current Firebase iOS stack is old.
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Fix iOS project assets
        script: |
          set -e
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          # The project currently contains two Assets.xcassets references.
          # The resource build phase can point to ios/Assets.xcassets, which has no AppIcon.
          # Point it back to ios/Runner/Assets.xcassets, where AppIcon.appiconset exists.
          perl -0pi -e 's/fileRef = 97C146FD1CF9000F007C117D \/\* Assets\.xcassets \*\//fileRef = 97C146FB1CF9000F007C117D \/\* Assets.xcassets \*\//g' "$PBXPROJ"
          grep -n "Assets.xcassets in Resources" "$PBXPROJ"
          # App Store Connect rejects app icons that contain transparency or an alpha channel.
          python3 tool/ci/flatten_ios_app_icons.py ios/Runner/Assets.xcassets/AppIcon.appiconset
      - name: Diagnose signing identities
        script: |
          echo "===== 1. VALID CODESIGNING IDENTITIES ====="
          security find-identity -v -p codesigning \
            /Users/builder/Library/codemagic-cli-tools/keychains/*.keychain-db || true
          echo ""
          echo "===== 2. ALL IDENTITIES (incl. invalid) ====="
          security find-identity -v \
            /Users/builder/Library/codemagic-cli-tools/keychains/*.keychain-db || true
          echo ""
          echo "===== 3. PROFILES ON DISK ====="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || true
          echo ""
          echo "===== 4. CERTS ON DISK ====="
          ls -la "$HOME/Library/MobileDevice/Certificates/" || true
          echo ""
          echo "===== 5. WHICH CERT EACH PROFILE EXPECTS ====="
          for p in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision; do
            echo "--- Profile file: $p ---"
            security cms -D -i "$p" > /tmp/prof.plist 2>/dev/null || true
            echo "Name:"
            /usr/libexec/PlistBuddy -c "Print :Name" /tmp/prof.plist 2>/dev/null || true
            echo "UUID:"
            /usr/libexec/PlistBuddy -c "Print :UUID" /tmp/prof.plist 2>/dev/null || true
            echo "Expected cert SHA1 fingerprint:"
            /usr/libexec/PlistBuddy -c "Print :DeveloperCertificates:0" /tmp/prof.plist 2>/dev/null \
              | openssl x509 -inform DER -noout -fingerprint -sha1 2>/dev/null || true
            echo "Expected cert subject:"
            /usr/libexec/PlistBuddy -c "Print :DeveloperCertificates:0" /tmp/prof.plist 2>/dev/null \
              | openssl x509 -inform DER -noout -subject 2>/dev/null || true
            echo ""
          done
      # Builds #62/#64/#65 all failed at archive with "profile doesn't include
      # aps-environment". Root cause: Codemagic's automatic signing (the
      # environment.ios_signing block) fetches/creates the App Store profile at
      # env-init, BEFORE any script runs, and reuses a stale Push-less profile —
      # deleting it afterwards is too late, and the on-disk copy is what
      # use-profiles then applies.
      #
      # Definitive fix: take deterministic control of the PROFILE (not the cert —
      # ios_signing already imported the distribution cert + private key into the
      # keychain, which is untouched here). We resolve the Bundle ID + all
      # distribution certificate resource ids, delete stale App Store profiles,
      # WIPE the on-disk profiles env-init fetched, then CREATE a brand-new
      # App Store profile via `profiles create`. That command needs only
      # certificate *resource ids* (not the private key), so it avoids the
      # cert-key error that broke #63. A freshly created profile includes every
      # capability enabled on the App ID — including Push. We then decode it on
      # disk and FAIL EARLY with a clear message if aps-environment is somehow
      # still absent (which would mean the App ID itself lacks Push).
      - name: Create fresh Push-enabled App Store profile + verify aps-environment
        script: |
          set -e
          BUNDLE_ID="com.rotem.whoisthere"
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          echo "===== A. Resolve Bundle ID resource id ====="
          app-store-connect bundle-ids list \
            --bundle-id-identifier "$BUNDLE_ID" --strict-match-identifier \
            --json > /tmp/bids.json
          BID=$(python3 -c "import json;d=json.load(open('/tmp/bids.json'));d=d.get('data',d) if isinstance(d,dict) else d;print(d[0]['id'] if d else '')")
          echo "Bundle ID resource id: '$BID'"
          [ -z "$BID" ] && { echo 'ERROR: bundle id not found via API'; exit 1; }

          echo "===== B. Collect ALL distribution certificate ids ====="
          # Build #66 failed here: filtering --type IOS_DISTRIBUTION found nothing
          # because the account signs with the *unified* "Apple Distribution"
          # certificate, whose certificateType is DISTRIBUTION (not the legacy
          # IOS_DISTRIBUTION). List every certificate and keep any distribution
          # type (DISTRIBUTION or IOS_DISTRIBUTION); fall back to any non-dev
          # cert if the type attribute is missing. Also print what we found.
          app-store-connect certificates list --json > /tmp/certs.json 2>/dev/null || echo '[]' > /tmp/certs.json
          CERT_IDS=$(python3 <<'PY'
          import json
          try:
              d = json.load(open('/tmp/certs.json'))
          except Exception:
              d = []
          if isinstance(d, dict):
              d = d.get('data', [])
          def ctype(c):
              return ((c.get('attributes') or {}).get('certificateType') or '').upper()
          for c in (d or []):
              print('  cert', c.get('id'), '=>', ctype(c) or '(no type attr)', file=__import__('sys').stderr)
          ids = [c['id'] for c in (d or []) if c.get('id') and ctype(c) in ('DISTRIBUTION', 'IOS_DISTRIBUTION')]
          if not ids:  # tolerate missing/renamed type attribute — take any non-development cert
              ids = [c['id'] for c in (d or []) if c.get('id') and 'DEVELOPMENT' not in ctype(c)]
          print(' '.join(ids))
          PY
          )
          echo "Distribution certificate ids: '$CERT_IDS'"
          [ -z "$CERT_IDS" ] && { echo 'ERROR: no distribution certificate in ASC (checked DISTRIBUTION + IOS_DISTRIBUTION)'; exit 1; }

          echo "===== C. Delete existing App Store profiles for this bundle id ====="
          for T in IOS_APP_STORE IOS_APP_STORE_ADHOC; do
            app-store-connect profiles list --bundle-id-identifier "$BUNDLE_ID" --profile-type "$T" --json > /tmp/pl_$T.json 2>/dev/null || echo '[]' > /tmp/pl_$T.json
            for pid in $(python3 -c "import json;d=json.load(open('/tmp/pl_$T.json'));d=d.get('data',d) if isinstance(d,dict) else d;print(' '.join(x['id'] for x in d if x.get('id')))"); do
              echo "deleting stale profile $pid ($T)"; app-store-connect profiles delete "$pid" || true
            done
          done

          echo "===== D. Wipe on-disk profiles fetched at env-init (may be stale/Push-less) ====="
          # profiles are cached in BOTH the legacy MobileDevice dir and the newer
          # Xcode UserData dir (where `profiles create --save` actually writes on
          # current Xcode). Wipe both so only the fresh profile from step E remains.
          PROF_DIRS=(
            "$HOME/Library/MobileDevice/Provisioning Profiles"
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          )
          for d in "${PROF_DIRS[@]}"; do
            rm -f "$d/"*.mobileprovision 2>/dev/null || true
            mkdir -p "$d"
          done

          echo "===== E. Create FRESH App Store profile (inherits App ID capabilities incl. Push) ====="
          app-store-connect profiles create "$BID" \
            --certificate-ids $CERT_IDS \
            --type IOS_APP_STORE \
            --name "WhoIsThere App Store CI $PROJECT_BUILD_NUMBER" \
            --save

          echo "===== F. Verify the freshly-saved profile GRANTS aps-environment ====="
          python3 - <<'PY'
          import glob, subprocess, plistlib, sys, os
          # `profiles create --save` writes to the Xcode UserData dir on current
          # Xcode; older tooling used the MobileDevice dir. Search BOTH.
          prof_dirs = [
              os.path.expanduser("~/Library/MobileDevice/Provisioning Profiles"),
              os.path.expanduser("~/Library/Developer/Xcode/UserData/Provisioning Profiles"),
          ]
          files = []
          for pd in prof_dirs:
              files += glob.glob(pd + "/*.mobileprovision")
          if not files:
              print("ERROR: no provisioning profile on disk after 'profiles create --save'")
              print("  searched:", prof_dirs); sys.exit(1)
          ok = False
          for f in files:
              raw = subprocess.run(["security", "cms", "-D", "-i", f], capture_output=True).stdout
              try:
                  pl = plistlib.loads(raw)
              except Exception as e:
                  print("could not decode", f, e); continue
              ent = pl.get("Entitlements", {})
              aps = ent.get("aps-environment")
              print(f"  {os.path.basename(f)}  name={pl.get('Name')!r}  aps-environment={aps!r}")
              if aps:
                  ok = True
          if not ok:
              print("ERROR: the freshly created profile does NOT grant aps-environment.")
              print("=> The App ID 'com.rotem.whoisthere' does not have Push Notifications")
              print("   enabled for App Store distribution in the Apple Developer portal.")
              print("   Enable Push on that App ID (Certificates, IDs & Profiles), then rebuild.")
              sys.exit(1)
          print("OK: a profile on disk grants aps-environment (Push). Proceeding.")
          PY
      - name: Set up code signing settings on Xcode project (pins the fresh profile)
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: |
          # Offset the Codemagic build counter by 1000 so the CFBundleVersion is
          # always > 55 (TestFlight already has build 55 from the legacy path)
          # while staying strictly increasing across builds. Apple rejects a
          # resubmit whose build number isn't higher than the last one.
          BUILD_NUMBER=$((PROJECT_BUILD_NUMBER + 1000))
          echo "Using iOS build number: $BUILD_NUMBER"
          flutter build ipa --release \
            --build-name=1.4.3 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Uploads the build to TestFlight so you can install it on your iPhone
        # via the TestFlight app. Does NOT submit for App Store review.
        submit_to_testflight: true

  # ===========================================================================
  # stores-release — ONE build that ships to BOTH stores.
  #
  # Runs on macOS (the only instance that can build a signed iOS IPA); the same
  # machine also builds the Android AAB. Publishing pushes the IPA to TestFlight
  # AND the AAB to Google Play in the same run.
  #
  # Trigger: push a tag like `release-v1` to the release branch.
  #   git tag release-v1 origin/claude/whoishere-visual-sound-rjcdzb
  #   git push origin release-v1
  #
  # Prerequisites (one-time, only rotem can do — same as the per-store setup):
  #   • iOS:     the `Apple_Key_Trivia` ASC API key integration (already set up).
  #   • Android: the `google_play` env var group holding a Play service-account
  #              JSON as GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
  #              (see ANDROID_GOOGLEPLAY_SETUP.md).
  # If the Google Play credentials are missing, the AAB still builds but the
  # Play upload step fails — set them up before using this workflow.
  #
  # iOS signing steps are identical to `ios-testflight` (the proven, stabilized
  # flow). Android reuses the same EA:3B Play upload key as build-aab.yml,
  # decoded from android/app/upload_keystore.b64 (no keystore upload needed).
  # ===========================================================================
  stores-release:
    name: WhoIsThere — App Store + Google Play (one run)
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'release-v*'
          include: true
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: Apple_Key_Trivia
    environment:
      groups:
        - google_play          # provides GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rotem.whoisthere
      flutter: 3.24.5          # iOS-proven; the app's SDK range builds Android on it too
      xcode: latest
      cocoapods: default
      vars:
        # EA:3B Play upload key — the ONLY key Play accepts (identical to
        # build-aab.yml). Repo is public; rotate post-launch (see CLAUDE.md TODO).
        KEYSTORE_STORE_PASS: "123456"
        KEYSTORE_ALIAS: "upload"
        KEYSTORE_KEY_PASS: "123456"
        PLAY_TRACK: "internal"  # switch to "production" for a public release
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Fix iOS project assets
        script: |
          set -e
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          # The project currently contains two Assets.xcassets references.
          # The resource build phase can point to ios/Assets.xcassets, which has no AppIcon.
          # Point it back to ios/Runner/Assets.xcassets, where AppIcon.appiconset exists.
          perl -0pi -e 's/fileRef = 97C146FD1CF9000F007C117D \/\* Assets\.xcassets \*\//fileRef = 97C146FB1CF9000F007C117D \/\* Assets.xcassets \*\//g' "$PBXPROJ"
          grep -n "Assets.xcassets in Resources" "$PBXPROJ"
          # App Store Connect rejects app icons that contain transparency or an alpha channel.
          python3 tool/ci/flatten_ios_app_icons.py ios/Runner/Assets.xcassets/AppIcon.appiconset
      - name: Create fresh Push-enabled App Store profile + verify aps-environment
        script: |
          set -e
          BUNDLE_ID="com.rotem.whoisthere"

          echo "===== A. Resolve Bundle ID resource id ====="
          app-store-connect bundle-ids list \
            --bundle-id-identifier "$BUNDLE_ID" --strict-match-identifier \
            --json > /tmp/bids.json
          BID=$(python3 -c "import json;d=json.load(open('/tmp/bids.json'));d=d.get('data',d) if isinstance(d,dict) else d;print(d[0]['id'] if d else '')")
          echo "Bundle ID resource id: '$BID'"
          [ -z "$BID" ] && { echo 'ERROR: bundle id not found via API'; exit 1; }

          echo "===== B. Collect ALL distribution certificate ids ====="
          app-store-connect certificates list --json > /tmp/certs.json 2>/dev/null || echo '[]' > /tmp/certs.json
          CERT_IDS=$(python3 <<'PY'
          import json
          try:
              d = json.load(open('/tmp/certs.json'))
          except Exception:
              d = []
          if isinstance(d, dict):
              d = d.get('data', [])
          def ctype(c):
              return ((c.get('attributes') or {}).get('certificateType') or '').upper()
          ids = [c['id'] for c in (d or []) if c.get('id') and ctype(c) in ('DISTRIBUTION', 'IOS_DISTRIBUTION')]
          if not ids:
              ids = [c['id'] for c in (d or []) if c.get('id') and 'DEVELOPMENT' not in ctype(c)]
          print(' '.join(ids))
          PY
          )
          echo "Distribution certificate ids: '$CERT_IDS'"
          [ -z "$CERT_IDS" ] && { echo 'ERROR: no distribution certificate in ASC'; exit 1; }

          echo "===== C. Delete existing App Store profiles for this bundle id ====="
          for T in IOS_APP_STORE IOS_APP_STORE_ADHOC; do
            app-store-connect profiles list --bundle-id-identifier "$BUNDLE_ID" --profile-type "$T" --json > /tmp/pl_$T.json 2>/dev/null || echo '[]' > /tmp/pl_$T.json
            for pid in $(python3 -c "import json;d=json.load(open('/tmp/pl_$T.json'));d=d.get('data',d) if isinstance(d,dict) else d;print(' '.join(x['id'] for x in d if x.get('id')))"); do
              echo "deleting stale profile $pid ($T)"; app-store-connect profiles delete "$pid" || true
            done
          done

          echo "===== D. Wipe on-disk profiles fetched at env-init ====="
          PROF_DIRS=(
            "$HOME/Library/MobileDevice/Provisioning Profiles"
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          )
          for d in "${PROF_DIRS[@]}"; do
            rm -f "$d/"*.mobileprovision 2>/dev/null || true
            mkdir -p "$d"
          done

          echo "===== E. Create FRESH App Store profile (inherits Push) ====="
          app-store-connect profiles create "$BID" \
            --certificate-ids $CERT_IDS \
            --type IOS_APP_STORE \
            --name "WhoIsThere App Store CI $PROJECT_BUILD_NUMBER" \
            --save

          echo "===== F. Verify the freshly-saved profile GRANTS aps-environment ====="
          python3 - <<'PY'
          import glob, subprocess, plistlib, sys, os
          prof_dirs = [
              os.path.expanduser("~/Library/MobileDevice/Provisioning Profiles"),
              os.path.expanduser("~/Library/Developer/Xcode/UserData/Provisioning Profiles"),
          ]
          files = []
          for pd in prof_dirs:
              files += glob.glob(pd + "/*.mobileprovision")
          if not files:
              print("ERROR: no provisioning profile on disk after 'profiles create --save'")
              print("  searched:", prof_dirs); sys.exit(1)
          ok = False
          for f in files:
              raw = subprocess.run(["security", "cms", "-D", "-i", f], capture_output=True).stdout
              try:
                  pl = plistlib.loads(raw)
              except Exception as e:
                  print("could not decode", f, e); continue
              ent = pl.get("Entitlements", {})
              aps = ent.get("aps-environment")
              print(f"  {os.path.basename(f)}  name={pl.get('Name')!r}  aps-environment={aps!r}")
              if aps:
                  ok = True
          if not ok:
              print("ERROR: the freshly created profile does NOT grant aps-environment.")
              print("=> Enable Push on App ID 'com.rotem.whoisthere', then rebuild.")
              sys.exit(1)
          print("OK: a profile on disk grants aps-environment (Push). Proceeding.")
          PY
      - name: Set up code signing settings on Xcode project (pins the fresh profile)
        script: xcode-project use-profiles
      - name: Build signed IPA (iOS)
        script: |
          # Offset the Codemagic build counter by 1000 so CFBundleVersion stays
          # strictly increasing and above the legacy TestFlight builds.
          BUILD_NUMBER=$((PROJECT_BUILD_NUMBER + 1000))
          echo "Using iOS build number: $BUILD_NUMBER"
          flutter build ipa --release \
            --build-name=1.4.3 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Restore EA:3B upload keystore (Android)
        script: |
          set -e
          base64 -d android/app/upload_keystore.b64 > android/app/keystore.jks
          SIZE=$(stat -c%s android/app/keystore.jks 2>/dev/null || stat -f%z android/app/keystore.jks)
          echo "keystore bytes: $SIZE"
          if [ "$SIZE" -lt 2000 ]; then echo "keystore decode failed ($SIZE bytes)"; exit 1; fi
      - name: Generate launcher icons (Android)
        # Safe here: the iOS IPA is already built above, so regenerating icons
        # cannot re-introduce alpha into the already-archived app icon.
        script: dart run flutter_launcher_icons || true
      - name: Build signed App Bundle (Android)
        script: |
          set -e
          # versionCode must exceed every code already on Play. The GitHub
          # build-aab path is at 40; offset the Codemagic counter by 100 so codes
          # stay strictly increasing and never collide with that path.
          VCODE=$((PROJECT_BUILD_NUMBER + 100))
          echo "Using Android versionCode: $VCODE"
          flutter build appbundle --release \
            --build-name=1.4.3 \
            --build-number=$VCODE
      - name: Verify AAB signed with the EA:3B upload key
        script: |
          CERT=$(keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab 2>&1)
          echo "$CERT" | grep -E "SHA1|SHA-1|Owner" || true
          if echo "$CERT" | grep -qiE "EA:?3B:?59:?B9:?2D:?4D:?F2:?58:?77:?4C:?33:?55:?76:?F3:?42:?46:?CC:?11:?D0:?75"; then
            echo "✓ AAB signed with the EA:3B Play upload key."
          else
            echo "AAB is NOT signed with the EA:3B upload key — Play would reject it."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/**/mapping.txt
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        # Internal testing track (no review wait) — testers get it immediately.
        track: $PLAY_TRACK
        submit_as_draft: false
