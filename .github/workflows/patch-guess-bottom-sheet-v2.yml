name: Patch guess bottom sheet v2

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/patch-guess-bottom-sheet-v2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch_feature_branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/guess-bottom-sheet-v2

      - name: Apply bottom sheet patch
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('lib/screens/game/game_board_screen.dart')
          s = path.read_text(encoding='utf-8')

          match = re.search(r"Future<void>\s+_openGuessDialog\s*\([^)]*\)\s*\{", s)
          if not match:
              raise SystemExit('_openGuessDialog not found')

          start = match.start()
          depth = 0
          end = None
          for i in range(start, len(s)):
              if s[i] == '{':
                  depth += 1
              elif s[i] == '}':
                  depth -= 1
                  if depth == 0:
                      end = i + 1
                      break

          if end is None:
              raise SystemExit('Could not find end of _openGuessDialog')

          new_fn = '''Future<void> _openGuessDialog(RoomModel room, String userId) async {
    final image = _image;
    if (image == null) return;

    await showModalBottomSheet<void>(
      context: context,
      isScrollControlled: true,
      useSafeArea: true,
      backgroundColor: Colors.transparent,
      builder: (sheetContext) => Directionality(
        textDirection: TextDirection.rtl,
        child: FractionallySizedBox(
          heightFactor: 0.60,
          alignment: Alignment.bottomCenter,
          child: ClipRRect(
            borderRadius: const BorderRadius.vertical(
              top: Radius.circular(24),
            ),
            child: Container(
              width: double.infinity,
              padding: const EdgeInsets.fromLTRB(10, 8, 10, 8),
              decoration: BoxDecoration(
                color: const Color(0xFF171B3D),
                border: Border(
                  top: BorderSide(color: Colors.white.withOpacity(0.10)),
                ),
              ),
              child: LayoutBuilder(
                builder: (context, constraints) {
                  final inputHeight = min(420.0, constraints.maxHeight - 52);
                  return Column(
                    mainAxisSize: MainAxisSize.min,
                    children: [
                      SizedBox(
                        height: 44,
                        child: Stack(
                          children: [
                            const Center(
                              child: Text(
                                'מה המקום?',
                                textAlign: TextAlign.center,
                                style: TextStyle(
                                  color: Colors.white,
                                  fontSize: 24,
                                  fontWeight: FontWeight.w900,
                                  height: 1,
                                ),
                              ),
                            ),
                            Align(
                              alignment: Alignment.centerLeft,
                              child: IconButton(
                                onPressed: () => Navigator.pop(sheetContext),
                                icon: const Icon(
                                  Icons.close_rounded,
                                  color: Colors.white54,
                                ),
                              ),
                            ),
                          ],
                        ),
                      ),
                      SizedBox(
                        height: inputHeight,
                        child: LetterBankInput(
                          answer: image.answer,
                          enabled: true,
                          onComplete: (filled) async {
                            final correct =
                                await _submitGuess(room, userId, filled);
                            if (sheetContext.mounted) {
                              Navigator.pop(sheetContext);
                            }
                            return correct;
                          },
                        ),
                      ),
                    ],
                  );
                },
              ),
            ),
          ),
        ),
      ),
    );
  }'''

          s = s[:start] + new_fn + s[end:]
          path.write_text(s, encoding='utf-8')
          PY

      - name: Commit to feature branch
        run: |
          git config user.name "github-actions-bot"
          git config user.email "github-actions-bot@example.com"
          git add lib/screens/game/game_board_screen.dart
          git commit -m "use bottom sheet for guess input" || exit 0
          git push origin feature/guess-bottom-sheet-v2

  remove_workflow:
    needs: patch_feature_branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Remove temporary workflow from main
        run: |
          rm .github/workflows/patch-guess-bottom-sheet-v2.yml
          git config user.name "github-actions-bot"
          git config user.email "github-actions-bot@example.com"
          git add .github/workflows/patch-guess-bottom-sheet-v2.yml
          git commit -m "remove temporary patch workflow" || exit 0
          git push origin main
