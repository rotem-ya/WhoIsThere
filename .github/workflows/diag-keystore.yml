name: Diag Keystore Secrets

# TEMPORARY diagnostic — reports which keystore-related secrets are present
# and prints the SHA1/alias of any keystore secret (public info, no passwords
# printed). Safe to delete after use.

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Which secrets are set
        run: |
          chk() { if [ -n "$2" ]; then echo "$1 = SET (len ${#2})"; else echo "$1 = EMPTY"; fi; }
          chk UPLOAD_KEYSTORE_BASE64   "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}"
          chk UPLOAD_KEYSTORE_PASSWORD "${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}"
          chk UPLOAD_KEY_ALIAS         "${{ secrets.UPLOAD_KEY_ALIAS }}"
          chk UPLOAD_KEY_PASSWORD      "${{ secrets.UPLOAD_KEY_PASSWORD }}"
          chk KEYSTORE_CONTENT         "${{ secrets.KEYSTORE_CONTENT }}"
          chk KEYSTORE_JKS_BASE64      "${{ secrets.KEYSTORE_JKS_BASE64 }}"
          chk KEYSTORE_BASE64          "${{ secrets.KEYSTORE_BASE64 }}"
          chk KEYSTORE_STORE_PASS      "${{ secrets.KEYSTORE_STORE_PASS }}"
          chk KEYSTORE_ALIAS           "${{ secrets.KEYSTORE_ALIAS }}"
          chk KEYSTORE_KEY_PASS        "${{ secrets.KEYSTORE_KEY_PASS }}"

      - name: Decode keystore candidates and print SHA1 (no passwords printed)
        run: |
          probe() {
            local name="$1" b64="$2"
            if [ -z "$b64" ]; then echo "$name: empty -> skip"; return; fi
            echo "$b64" | base64 -d > k.jks 2>/dev/null || { echo "$name: NOT valid base64"; return; }
            echo "$name decoded bytes: $(stat -c%s k.jks)"
            for sp in '123456' 'WhoIsThere2024!'; do
              out=$(keytool -list -v -keystore k.jks -storepass "$sp" 2>/dev/null)
              if [ -n "$out" ]; then
                echo "$name opens (storepass ${#sp} chars):"
                echo "$out" | grep -iE "Alias name|SHA1:" || true
                return
              fi
            done
            echo "$name: did NOT open with known candidate passwords"
          }
          probe UPLOAD_KEYSTORE_BASE64 "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}"
          probe KEYSTORE_CONTENT       "${{ secrets.KEYSTORE_CONTENT }}"
          probe KEYSTORE_JKS_BASE64    "${{ secrets.KEYSTORE_JKS_BASE64 }}"
          probe KEYSTORE_BASE64        "${{ secrets.KEYSTORE_BASE64 }}"
