name: Build APK

on:
  push:
    branches: [ main, claude/** ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Write GoogleService-Info.plist
        env:
          IOS_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: '[ -n "$IOS_PLIST" ] && echo "$IOS_PLIST" > ios/Runner/GoogleService-Info.plist || true'

      - name: Restore fixed keystore
        run: |
          echo "" | base64 -d > android/app/keystore.jks

      - name: Clean Flutter and pub cache
        run: |
          flutter clean
          rm -rf ~/.pub-cache

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze (non-blocking for QA builds)
        run: flutter analyze || true

      - name: Build release APK
        env:
          KEYSTORE_STORE_PASS: "WhoIsThere2024!"
          KEYSTORE_ALIAS: "whoisthere"
          KEYSTORE_KEY_PASS: "WhoIsThere2024!"
        run: flutter build apk --release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: GuessThePlace-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
