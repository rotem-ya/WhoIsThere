name: Build APK

on:
  push:
    branches: [ main, claude/** ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Write GoogleService-Info.plist
        env:
          IOS_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: '[ -n "$IOS_PLIST" ] && echo "$IOS_PLIST" > ios/Runner/GoogleService-Info.plist || true'

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_JKS_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/keystore.jks
          fi

      - name: Extract SHA-1 fingerprint
        env:
          KEYSTORE_STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASS }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
        run: |
          mkdir -p /tmp/sha1-output
          if [ -f android/app/keystore.jks ]; then
            SHA1=$(keytool -list -v \
              -keystore android/app/keystore.jks \
              -storepass "$KEYSTORE_STORE_PASS" \
              -alias "$KEYSTORE_ALIAS" 2>/dev/null | grep "SHA1:" | awk '{print $2}')
          else
            SHA1=$(keytool -list -v \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey 2>/dev/null | grep "SHA1:" | awk '{print $2}')
          fi
          echo "SHA-1: $SHA1"
          echo "$SHA1" > /tmp/sha1-output/sha1.txt
          echo "ADD THIS SHA-1 TO FIREBASE CONSOLE -> Android App -> Add fingerprint:"
          echo "$SHA1"

      - name: Upload SHA-1 as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore-sha1
          path: /tmp/sha1-output/sha1.txt
          retention-days: 30

      - name: Clean Flutter and pub cache
        run: |
          flutter clean
          rm -rf ~/.pub-cache

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze (non-blocking for QA builds)
        run: flutter analyze || true

      - name: Build release APK
        env:
          KEYSTORE_STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASS }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASS: ${{ secrets.KEYSTORE_KEY_PASS }}
        run: flutter build apk --release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: GuessThePlace-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
