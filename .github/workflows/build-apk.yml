name: Build APK

on:
  push:
    branches: [ main, claude/puzzle-game-design-CaQqV ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK release (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload arm64 APK (Samsung Galaxy)
        uses: actions/upload-artifact@v4
        with:
          name: WhoIsThere-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 14

      - name: Upload all release APKs
        uses: actions/upload-artifact@v4
        with:
          name: WhoIsThere-release-all
          path: build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 14
