name: Build APK

on:
  push:
    branches: [ main, claude/** ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Verify google-services.json
        run: |
          if [ ! -f "android/app/google-services.json" ]; then
            echo "ERROR: google-services.json missing from repo"
            exit 1
          fi
          echo "✓ Using google-services.json from repo"
          grep -q "oauth_client" android/app/google-services.json && echo "✓ OAuth clients present"

      - name: Write GoogleService-Info.plist
        env:
          IOS_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: '[ -n "$IOS_PLIST" ] && echo "$IOS_PLIST" > ios/Runner/GoogleService-Info.plist || true'

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_JKS_BASE64 }}
        run: |
          echo "=== Keystore Decode Diagnostic ==="
          echo "KEYSTORE_B64 length: ${#KEYSTORE_B64}"
          if [ -z "$KEYSTORE_B64" ]; then
            echo "ERROR: KEYSTORE_B64 is EMPTY — secret KEYSTORE_JKS_BASE64 is missing or unavailable to this workflow"
          else
            echo "KEYSTORE_B64 is present (${#KEYSTORE_B64} bytes)"
            echo "$KEYSTORE_B64" | base64 -d > android/app/keystore.jks
            if [ -f "android/app/keystore.jks" ]; then
              echo "File created: android/app/keystore.jks"
              ls -lh android/app/keystore.jks
            else
              echo "ERROR: File was not created"
            fi
          fi
          echo "=== End Diagnostic ==="

      - name: Extract release keystore SHA-1
        env:
          KEYSTORE_STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASS }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
        run: |
          echo "=== Keystore Diagnostic ==="
          if [ -f "android/app/keystore.jks" ]; then
            echo "keystore exists"
            keytool -list -v -keystore android/app/keystore.jks -storepass "$KEYSTORE_STORE_PASS" -alias "$KEYSTORE_ALIAS"
          else
            echo "keystore missing"
          fi
          echo "=== Directory listing ==="
          ls -la android/app/
          echo "=== Credential lengths ==="
          echo "KEYSTORE_ALIAS length: ${#KEYSTORE_ALIAS}"
          echo "KEYSTORE_STORE_PASS length: ${#KEYSTORE_STORE_PASS}"
          echo "=== End diagnostic ==="

      - name: Clean Flutter and pub cache
        run: |
          flutter clean
          rm -rf ~/.pub-cache

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze (non-blocking for QA builds)
        run: flutter analyze || true

      - name: Build release APK
        env:
          KEYSTORE_STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASS }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASS: ${{ secrets.KEYSTORE_KEY_PASS }}
        run: flutter build apk --release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: GuessThePlace-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
