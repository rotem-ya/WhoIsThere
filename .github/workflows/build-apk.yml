name: Build APK

on:
  push:
    branches: [ main, claude/puzzle-game-design-CaQqV, rotem/qa-fixes-step-1 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Flutter pub get
        run: flutter pub get

      - name: Setup signing keystore
        run: |
          if [ -n "$KEYSTORE_CONTENT" ]; then
            echo "$KEYSTORE_CONTENT" | base64 -d > android/app/keystore.jks
            echo "Using release keystore from GitHub Secrets"
          else
            echo "KEYSTORE_CONTENT secret is missing. Release APK cannot be signed."
            exit 1
          fi

          if [ -z "$KEYSTORE_STORE_PASS" ] || [ -z "$KEYSTORE_ALIAS" ] || [ -z "$KEYSTORE_KEY_PASS" ]; then
            echo "One or more signing secrets are missing: KEYSTORE_STORE_PASS, KEYSTORE_ALIAS, KEYSTORE_KEY_PASS."
            exit 1
          fi

          echo "=== SHA-1 (Firebase Console) ==="
          keytool -list -v -keystore android/app/keystore.jks -storepass "$KEYSTORE_STORE_PASS" 2>/dev/null | grep "SHA1:" || true
        env:
          KEYSTORE_CONTENT: ${{ secrets.KEYSTORE_CONTENT }}
          KEYSTORE_STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASS }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASS: ${{ secrets.KEYSTORE_KEY_PASS }}

      - name: Build APK release (split per ABI)
        run: flutter build apk --release --split-per-abi
        env:
          KEYSTORE_STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASS }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASS: ${{ secrets.KEYSTORE_KEY_PASS }}

      - name: Upload arm64 APK (Samsung Galaxy)
        uses: actions/upload-artifact@v4
        with:
          name: GuessThePlace-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 14

      - name: Upload all release APKs
        uses: actions/upload-artifact@v4
        with:
          name: GuessThePlace-release-all
          path: build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 14
