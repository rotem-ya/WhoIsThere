name: Build APK

on:
  push:
    branches: [ main, claude/puzzle-game-design-CaQqV, rotem/qa-fixes-step-1 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze (non-blocking for QA builds)
        run: flutter analyze || true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GuessThePlace-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
