name: ⚠️ Generate Release Keystore — RUN ONLY ONCE

# ⚠️ WARNING: Running this workflow creates a NEW keystore with a NEW SHA-1.
# You will need to re-register the SHA-1 in Firebase and update all secrets.
# The current keystore is stored in KEYSTORE_JKS_BASE64 — DO NOT regenerate unless lost.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type REGENERATE to confirm (this breaks Google Sign-In until Firebase is updated)'
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'REGENERATE'

    steps:
      - name: Generate keystore and print setup info
        run: |
          keytool -genkey -v \
            -keystore release.jks \
            -alias whoisthere \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass 'WhoIsThere2024!' \
            -keypass 'WhoIsThere2024!' \
            -dname "CN=WhoIsThere App, OU=Mobile, O=WhoIsThere, L=Israel, ST=Israel, C=IL"

          echo "================================================================"
          echo "STEP 1 - Update these GitHub Secrets:"
          echo "================================================================"
          echo "KEYSTORE_ALIAS      = whoisthere"
          echo "KEYSTORE_STORE_PASS = WhoIsThere2024!"
          echo "KEYSTORE_KEY_PASS   = WhoIsThere2024!"
          echo ""
          echo "KEYSTORE_JKS_BASE64 = (copy below)"
          base64 -w 0 release.jks
          echo ""
          echo "================================================================"
          echo "STEP 2 - Add NEW SHA-1 to Firebase Console:"
          echo "================================================================"
          keytool -list -v \
            -keystore release.jks \
            -alias whoisthere \
            -storepass 'WhoIsThere2024!' \
            2>/dev/null | grep "SHA1:"
          echo "================================================================"
