name: Generate Release Keystore (Run Once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate keystore and print setup info
        run: |
          keytool -genkey -v \
            -keystore release.jks \
            -alias whoisthere \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass 'WhoIsThere2024!' \
            -keypass 'WhoIsThere2024!' \
            -dname "CN=WhoIsThere App, OU=Mobile, O=WhoIsThere, L=Israel, ST=Israel, C=IL"

          echo ""
          echo "================================================================"
          echo "STEP 1 - Add these 3 GitHub Secrets (Settings -> Secrets):"
          echo "================================================================"
          echo "KEYSTORE_ALIAS      = whoisthere"
          echo "KEYSTORE_STORE_PASS = WhoIsThere2024!"
          echo "KEYSTORE_KEY_PASS   = WhoIsThere2024!"
          echo ""
          echo "KEYSTORE_CONTENT = (copy everything between the dashes below)"
          echo "---BEGIN KEYSTORE BASE64---"
          base64 -w 0 release.jks
          echo ""
          echo "---END KEYSTORE BASE64---"
          echo ""
          echo "================================================================"
          echo "STEP 2 - Add this SHA-1 to Firebase Console -> Android App:"
          echo "================================================================"
          keytool -list -v \
            -keystore release.jks \
            -alias whoisthere \
            -storepass 'WhoIsThere2024!' \
            2>/dev/null | grep "SHA1:"
          echo "================================================================"
