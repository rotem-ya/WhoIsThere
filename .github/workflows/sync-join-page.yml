name: Sync public pages → apps-share-pages

on:
  push:
    branches: [main]
    paths:
      - docs/join.html
      - docs/friend.html
      - docs/privacy.html
      - docs/support.html
      - docs/download.html
      - docs/content_catalog_seed.json
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push public pages to apps-share-pages
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_SYNC_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git clone https://x-access-token:$PAGES_TOKEN@github.com/rotem-ya/apps-share-pages.git /tmp/pages

          mkdir -p /tmp/pages/whoisthere/join
          cp docs/join.html /tmp/pages/whoisthere/join/index.html

          mkdir -p /tmp/pages/whoisthere/friend
          cp docs/friend.html /tmp/pages/whoisthere/friend/index.html

          mkdir -p /tmp/pages/whoisthere/privacy
          cp docs/privacy.html /tmp/pages/whoisthere/privacy/index.html

          mkdir -p /tmp/pages/whoisthere/support
          cp docs/support.html /tmp/pages/whoisthere/support/index.html

          mkdir -p /tmp/pages/whoisthere/download
          cp docs/download.html /tmp/pages/whoisthere/download/index.html

          mkdir -p /tmp/pages/whoisthere/content
          cp docs/content_catalog_seed.json /tmp/pages/whoisthere/content/content_catalog_seed.json

          cd /tmp/pages
          git add whoisthere/
          git diff --staged --quiet && echo "No changes, skipping." && exit 0
          git commit -m "sync: WhoIsThere public pages (${GITHUB_SHA::7})"
          git push
