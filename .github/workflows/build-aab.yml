name: Build AAB (Google Play)

# Builds a signed Android App Bundle (.aab) for upload to Google Play.
# Google Play requires an .aab (not .apk) for new apps.
#
# Run by pushing the .github/aab-release.txt marker on main (or pushing an
# aab-v* tag). The resulting app-release.aab is uploaded as a build artifact
# you can download and upload to the Play Console (Internal testing /
# Production).
#
# Signing uses the release keystore stored in GitHub Secrets:
#   KEYSTORE_CONTENT     - base64 of the .jks keystore
#   KEYSTORE_STORE_PASS  - keystore password
#   KEYSTORE_ALIAS       - key alias
#   KEYSTORE_KEY_PASS    - key password
# This is the SAME key whose SHA-1 (25:C3:...) is registered in Firebase for
# Google Sign-In and used by the QA APK builds. Do NOT swap or regenerate
# these secrets — it would break Google Sign-In and Play upload signing.
#
# versionCode is set from the workflow run number so every build that lands
# on Play has a strictly increasing code (Play rejects duplicate codes).

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Version name shown to users (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
  push:
    tags:
      - 'aab-v*'
    branches:
      - main
      - claude/google-connect-review-submit-mp11cq
    # Only build an AAB when the release marker file changes, so ordinary
    # pushes don't trigger a Play build on every commit.
    paths:
      - '.github/aab-release.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Restore release keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_CONTENT }}" | base64 -d > android/app/keystore.jks
          echo "keystore bytes: $(stat -c%s android/app/keystore.jks)"

      - name: Clean Flutter and pub cache
        run: |
          flutter clean
          rm -rf ~/.pub-cache

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build signed App Bundle
        env:
          KEYSTORE_STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASS }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASS: ${{ secrets.KEYSTORE_KEY_PASS }}
        run: |
          flutter build appbundle --release \
            --build-name="${{ github.event.inputs.build_name || '1.0.0' }}" \
            --build-number="${{ github.run_number }}"

      - name: Verify AAB signing certificate SHA
        run: |
          echo "=== AAB signing certificate SHA ==="
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab 2>&1 \
            | grep -E "SHA|Owner|Issuer" || echo "(could not read cert)"

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: GuessThePlace-playstore-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
