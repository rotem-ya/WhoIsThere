name: Build AAB (Google Play)

# Builds a signed Android App Bundle (.aab) for upload to Google Play.
# Google Play requires an .aab (not .apk) for new apps.
#
# Run manually from the Actions tab (workflow_dispatch). The resulting
# app-release.aab is uploaded as a build artifact you can download and
# upload to the Play Console (Internal testing / Production).
#
# Signing uses the dedicated Play upload keystore supplied via GitHub
# Secrets (UPLOAD_KEYSTORE_BASE64 / UPLOAD_KEYSTORE_PASSWORD /
# UPLOAD_KEY_ALIAS / UPLOAD_KEY_PASSWORD), whose SHA-1 is registered in
# Firebase for Google Sign-In. Do NOT swap or regenerate these secrets —
# it would break Google Sign-In and Play upload signing.
#
# versionCode is set from the workflow run number so every build that lands
# on Play has a strictly increasing code (Play rejects duplicate codes).

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Version name shown to users (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
  push:
    tags:
      - 'aab-v*'
    branches:
      - main
    # Only build an AAB when the release marker file changes, so ordinary
    # pushes to main don't trigger a Play build on every commit.
    paths:
      - '.github/aab-release.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Restore upload keystore from secret
        run: |
          echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks

      - name: Clean Flutter and pub cache
        run: |
          flutter clean
          rm -rf ~/.pub-cache

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build signed App Bundle
        env:
          KEYSTORE_STORE_PASS: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          KEYSTORE_KEY_PASS: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-name="${{ github.event.inputs.build_name || '1.0.0' }}" \
            --build-number="${{ github.run_number }}"

      - name: Verify AAB signing certificate SHA
        run: |
          echo "=== AAB signing certificate SHA ==="
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab 2>&1 \
            | grep -E "SHA|Owner|Issuer" || echo "(could not read cert)"

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: GuessThePlace-playstore-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
