name: Build AAB (Google Play)

# Builds a signed Android App Bundle (.aab) for upload to Google Play.
# Google Play requires an .aab (not .apk) for new apps.
#
# Run by pushing the .github/aab-release.txt marker on main (or pushing an
# aab-v* tag). The resulting app-release.aab is uploaded as a build artifact
# you can download and upload to the Play Console (Internal testing /
# Production).
#
# Signing uses the Play UPLOAD keystore whose SHA-1 ends in EA:3B — the key
# registered under Play App Signing (Play rejects any other upload key). It is
# supplied via GitHub Secrets and never committed:
#   UPLOAD_KEYSTORE_BASE64  — base64 of upload-keystore.jks
#   UPLOAD_KEYSTORE_PASSWORD / UPLOAD_KEY_ALIAS / UPLOAD_KEY_PASSWORD
# (The QA APK builds use a DIFFERENT key, 25:C3, for direct-install sideloading;
# that key must NOT be used for the Play AAB.) Setup: PLAY_UPLOAD_KEY_SETUP.md.
# The build fails fast if the secret is missing, and the verify step fails if
# the resulting AAB is not signed with EA:3B — so a wrong-key AAB can't ship.
#
# versionCode is set from the workflow run number so every build that lands
# on Play has a strictly increasing code (Play rejects duplicate codes).

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Version name shown to users (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
  push:
    tags:
      - 'aab-v*'
    branches:
      - main
      - claude/qa-launch-prep-EXqLn
    # Only build an AAB when the release marker file changes, so ordinary
    # pushes don't trigger a Play build on every commit.
    paths:
      - '.github/aab-release.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Restore Play upload keystore (EA:3B) from secret
        run: |
          # Google Play App Signing requires the AAB to be signed with the
          # registered UPLOAD key, whose SHA-1 ends in EA:3B. That key lives ONLY
          # in the UPLOAD_KEYSTORE_BASE64 secret (it is never committed). Signing
          # with any other key (e.g. the 25:C3 QA key) makes Play reject the AAB.
          if [ -z "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" ]; then
            echo "::error::UPLOAD_KEYSTORE_BASE64 secret is not set. Add the EA:3B upload-keystore.jks (see PLAY_UPLOAD_KEY_SETUP.md) before building for Play."
            exit 1
          fi
          # Strip any whitespace/newlines a copy-paste may have introduced, and
          # ignore stray non-base64 chars, so a slightly messy paste still decodes.
          echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 -di > android/app/keystore.jks 2>/dev/null || true
          SIZE=$(stat -c%s android/app/keystore.jks 2>/dev/null || echo 0)
          echo "keystore bytes: $SIZE"
          if [ "$SIZE" -lt 2000 ]; then
            echo "::error::Decoded keystore is only $SIZE bytes (expected ~2259). The UPLOAD_KEYSTORE_BASE64 secret is empty/truncated — re-paste the FULL contents of UPLOAD_KEYSTORE_BASE64.txt."
            exit 1
          fi

      - name: Clean Flutter and pub cache
        run: |
          flutter clean
          rm -rf ~/.pub-cache

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build signed App Bundle
        env:
          KEYSTORE_STORE_PASS: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          KEYSTORE_KEY_PASS: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-name="${{ github.event.inputs.build_name || '1.0.0' }}" \
            --build-number="${{ github.run_number }}"

      - name: Verify AAB is signed with the EA:3B upload key
        run: |
          CERT=$(keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab 2>&1)
          echo "$CERT" | grep -E "SHA1|SHA-1|Owner" || true
          if echo "$CERT" | grep -qiE "EA:?3B:?59:?B9:?2D:?4D:?F2:?58:?77:?4C:?33:?55:?76:?F3:?42:?46:?CC:?11:?D0:?75"; then
            echo "✓ AAB signed with the EA:3B Play upload key."
          else
            echo "::error::AAB is NOT signed with the EA:3B upload key — Play will reject it. Check the UPLOAD_* secrets."
            exit 1
          fi

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: GuessThePlace-playstore-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
