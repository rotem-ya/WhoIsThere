name: Build AAB (Google Play)

# Builds a signed Android App Bundle (.aab) for upload to Google Play.
# Google Play requires an .aab (not .apk) for new apps.
#
# Run by pushing the .github/aab-release.txt marker on main (or pushing an
# aab-v* tag). The resulting app-release.aab is uploaded as a build artifact
# you can download and upload to the Play Console (Internal testing /
# Production).
#
# Signing uses the Play UPLOAD keystore whose SHA-1 ends in EA:3B — the key
# registered under Play App Signing (Play rejects any other upload key). It is
# embedded (base64) in the Restore step below because pasting it as a GitHub
# secret on mobile proved unreliable. TODO(security): rotate this upload key
# after launch and move it to a secret (repo is public). The QA APK builds use
# a DIFFERENT key (25:C3) for direct-install sideloading — not for the Play AAB.
# The verify step hard-fails unless the AAB is signed with EA:3B.
#
# versionCode is set from the workflow run number so every build that lands
# on Play has a strictly increasing code (Play rejects duplicate codes).

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Version name shown to users (e.g. 1.2.0)'
        required: true
        default: '1.2.0'
  push:
    tags:
      - 'aab-v*'
    branches:
      - main
      - claude/qa-launch-prep-EXqLn
      # Session branch — content-identical to the launch branch (synced by the
      # release-refs workflow); token ref-updates can't trigger this workflow,
      # so the build fires from the session branch's own push instead.
      - claude/whothere-v111-launch-iqkbq2
    # Only build an AAB when the release marker file changes, so ordinary
    # pushes don't trigger a Play build on every commit.
    paths:
      - '.github/aab-release.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Restore Play upload keystore (EA:3B, embedded)
        run: |
          # EA:3B Play upload key embedded directly (mobile secret paste was
          # unreliable). Public-repo exposure accepted for launch; rotate the
          # upload key post-launch. QA APKs still use the separate 25:C3 key.
          echo "" | base64 -d > android/app/keystore.jks
          SIZE=$(stat -c%s android/app/keystore.jks 2>/dev/null || echo 0)
          echo "keystore bytes: $SIZE"
          if [ "$SIZE" -lt 2000 ]; then echo "::error::keystore decode failed ($SIZE bytes)"; exit 1; fi

      - name: Clean Flutter and pub cache
        run: |
          flutter clean
          rm -rf ~/.pub-cache

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build signed App Bundle
        env:
          KEYSTORE_STORE_PASS: "123456"
          KEYSTORE_ALIAS: "upload"
          KEYSTORE_KEY_PASS: "123456"
        run: |
          flutter build appbundle --release \
            --build-name="${{ github.event.inputs.build_name || '1.2.0' }}" \
            --build-number="${{ github.run_number }}"

      - name: Verify AAB is signed with the EA:3B upload key
        run: |
          CERT=$(keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab 2>&1)
          echo "$CERT" | grep -E "SHA1|SHA-1|Owner" || true
          if echo "$CERT" | grep -qiE "EA:?3B:?59:?B9:?2D:?4D:?F2:?58:?77:?4C:?33:?55:?76:?F3:?42:?46:?CC:?11:?D0:?75"; then
            echo "✓ AAB signed with the EA:3B Play upload key."
          else
            echo "::error::AAB is NOT signed with the EA:3B upload key — Play will reject it. Check the UPLOAD_* secrets."
            exit 1
          fi

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: GuessThePlace-playstore-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7
