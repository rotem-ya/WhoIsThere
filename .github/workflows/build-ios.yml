name: Build iOS (TestFlight)

# Builds a signed iOS .ipa and (optionally) uploads it to TestFlight.
#
# Run manually from the Actions tab (workflow_dispatch). The signed .ipa is
# uploaded as a build artifact; if the App Store Connect API-key secrets are
# present it is also pushed to TestFlight.
#
# ── REQUIRED GitHub Secrets ──────────────────────────────────────────────
# Signing (manual, App Store distribution):
#   IOS_DIST_CERT_BASE64        base64 of your Apple Distribution .p12
#                               (export from Keychain Access; base64 -i cert.p12)
#   IOS_DIST_CERT_PASSWORD      password you set when exporting the .p12
#   IOS_PROVISION_PROFILE_BASE64  base64 of the App Store provisioning profile
#                               (.mobileprovision) for com.rotem.whoisthere.
#                               ⚠️ It MUST include the "Sign in with Apple"
#                               capability, otherwise the build fails and the
#                               feature stays broken (error 1000).
#   IOS_TEAM_ID                 10-char Apple Developer Team ID
#   IOS_KEYCHAIN_PASSWORD       any throwaway string (temp CI keychain)
#
# TestFlight upload (App Store Connect API key — optional but recommended):
#   ASC_KEY_ID                  App Store Connect API key ID
#   ASC_ISSUER_ID               App Store Connect issuer ID
#   ASC_API_KEY_BASE64          base64 of the AuthKey_XXXX.p8 file
# If the ASC_* secrets are absent the workflow still produces the .ipa artifact;
# you can then upload it manually via Transporter.

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Version name shown to users (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      upload_testflight:
        description: 'Upload to TestFlight (requires ASC_* secrets)'
        type: boolean
        required: false
        default: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    env:
      BUNDLE_ID: com.rotem.whoisthere

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Import signing certificate & provisioning profile
        env:
          DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$DIST_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          # Create a temporary keychain and import the distribution cert.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DIST_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Install the provisioning profile and capture its UUID + name.
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PLIST=$(security cms -D -i "$PROFILE_PATH")
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$PLIST")
          NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< "$PLIST")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "PROFILE_UUID=$UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$NAME" >> "$GITHUB_ENV"
          echo "Installed provisioning profile: $NAME ($UUID)"

      - name: Write ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          echo "--- ExportOptions.plist ---"; cat "$RUNNER_TEMP/ExportOptions.plist"

      - name: Flutter pub get
        run: |
          flutter clean
          flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build signed IPA
        run: |
          flutter build ipa --release \
            --build-name="${{ github.event.inputs.build_name || '1.0.0' }}" \
            --build-number="${{ github.run_number }}" \
            --export-options-plist="$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhoIsThere-ios-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        if: ${{ github.event.inputs.upload_testflight == 'true' && secrets.ASC_KEY_ID != '' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          # Place the API key where altool/xcrun looks for it.
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_API_KEY_BASE64" | base64 --decode \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          IPA=$(ls build/ios/ipa/*.ipa | head -n1)
          echo "Uploading $IPA to TestFlight…"
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
