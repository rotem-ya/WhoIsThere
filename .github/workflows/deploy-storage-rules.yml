name: Deploy Storage Rules

# Deploys storage.rules to the Firebase project using the existing
# FIREBASE_SERVICE_ACCOUNT secret (same one deploy-firestore-rules.yml uses).
#
# Run manually from the Actions tab, or it runs automatically when
# storage.rules changes on main.
#
# NOTE: if the default bucket is not <project>.appspot.com (newer projects use
# <project>.firebasestorage.app), set the STORAGE_BUCKET repo/Actions variable.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - storage.rules

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is not set"
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Install deps
        run: npm install google-auth-library

      - name: Deploy Storage rules (REST API)
        env:
          RULES_TARGET: storage
          STORAGE_BUCKET: ${{ vars.STORAGE_BUCKET }}
        run: node scripts/deploy_rules.js
