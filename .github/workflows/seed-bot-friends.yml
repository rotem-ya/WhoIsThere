name: Seed Bot Friends (dev/testing)

on:
  workflow_dispatch:
    inputs:
      target_email:
        description: 'Email of the account to attach the 7 bot friends to'
        required: true

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-admin
        run: npm install firebase-admin
        working-directory: scripts

      - name: Seed bot friends
        run: node seed_bot_friends.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TARGET_EMAIL: ${{ github.event.inputs.target_email }}
