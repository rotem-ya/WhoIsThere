name: Deploy Firebase Hosting

# Deploys the public/ site (privacy, support, friend, join, download,
# app-ads.txt, admin content seed) to Firebase Hosting:
#   https://whoisthere-380fa.web.app
# Uses the SAME FIREBASE_SERVICE_ACCOUNT secret that deploy-firestore-rules
# and seed-firestore use. This replaces both GitHub Pages sites, so the repo
# can go private without breaking anything outward-facing.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/qa-launch-prep-EXqLn
      - claude/whothere-v111-launch-iqkbq2
    paths:
      - 'public/**'
      - 'firebase.json'
      - '.github/workflows/deploy-hosting.yml'
      - 'assets/game_places/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # The admin app reads the game's bundled catalog (data JSONs + images)
      # from a public URL. Serving them from Hosting (staged at deploy time,
      # NOT committed under public/) keeps the admin working when this repo
      # goes private — raw.githubusercontent links die then.
      #   https://whoisthere-380fa.web.app/assets/game_places/...
      - name: Stage game content for the admin app
        run: |
          mkdir -p public/assets
          cp -r assets/game_places public/assets/game_places

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: whoisthere-380fa
